name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install model-free bridge deps
        run: python -m pip install numpy==2.4.6 websockets==16.0

      - name: Run local gate
        run: LCC_TEST_PYTHON="$(which python)" bash check.sh
